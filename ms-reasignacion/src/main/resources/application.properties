server.port=8084
spring.application.name=servicio-reasignacion

# Base de datos compartida H2
spring.datasource.url=jdbc:h2:file:./data/rednorte-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# URLs de los microservicios
ms.pacientes.url=http://localhost:8081
ms.citas.url=http://localhost:8082
ms.lista-espera.url=http://localhost:8083

# Configuración de logging
logging.level.root=INFO
logging.level.com.rednorte.servicio_reasignacion=DEBUG

# Scheduling
spring.task.scheduling.pool.size=5
